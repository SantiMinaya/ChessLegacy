<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Stockfish API</title>
</head>
<body>
    <h1>Test Stockfish API</h1>
    <button onclick="testAPI()">Probar API</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Probando...';
            
            try {
                const response = await fetch('http://localhost:5000/api/juego/mejor-movimiento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        fen: 'rnbqkbnr/pppppppp/8/8/4P3/8/PPPP1PPP/RNBQKBNR b KQkq e3 0 1' 
                    })
                });

                const text = await response.text();
                resultEl.textContent = `Status: ${response.status}\n\nRespuesta:\n${text}`;
                
            } catch (error) {
                resultEl.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
